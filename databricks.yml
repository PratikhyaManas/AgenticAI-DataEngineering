# ==============================================================
# Databricks Asset Bundle Definition
# Agent: CI/CD & DevOps Agent
#
# Defines Databricks Workflows (DAGs) deployed via DAB.
# Targets: dev, test, prod (each maps to a separate workspace)
# Reference: https://docs.databricks.com/en/dev-tools/bundles/
#
# Compute strategy:
#   Batch jobs  → Serverless compute (environment_key) — pay-per-use, no idle cost
#   Streaming   → Dedicated cluster  — Maven Event Hubs connector not supported
#                                      on serverless; always-on workload suits
#                                      dedicated pricing
# ==============================================================

bundle:
  name: lakehouse-data-platform

workspace:
  auth_type: pat              # Overridden per target via env-specific secrets
  root_path: /Shared/lakehouse-platform

variables:
  env:
    description: "Deployment environment"
    default: dev
  storage_account:
    description: "ADLS Gen2 storage account name"
  openai_endpoint:
    description: "Azure OpenAI endpoint URL for agentic features"
  openai_deployment:
    description: "Azure OpenAI model deployment name (e.g. gpt-4o)"
    default: gpt-4o
  openai_secret_scope:
    description: "Databricks secret scope backing the Key Vault with OpenAI key"
    default: lakehouse-kv-scope
  model_name:
    description: "MLflow registered model name for drift monitoring"
    default: sales_clv_forecasting
  retraining_job_id:
    description: "Databricks Job ID of the model retraining job"
    default: "0"
  anon_salt_secret_scope:
    description: "Databricks secret scope holding the GDPR anonymization salt"
    default: lakehouse-kv-scope
  openlineage_transport:
    description: "OpenLineage transport: http or console"
    default: http
  openlineage_url:
    description: "Marquez / Purview proxy base URL for OpenLineage events"
    default: ""
  openlineage_namespace:
    description: "OpenLineage namespace (logical grouping for all jobs)"
    default: lakehouse

resources:
  # ---------------------------------------------------------------------------
  # Databricks Workflow: Daily Batch Pipeline  (Serverless compute)
  # ---------------------------------------------------------------------------
  jobs:
    daily_batch_pipeline:
      name: "lakehouse-daily-batch-${var.env}"
      description: "Full daily batch pipeline: ingest → bronze DQ → silver clean → gold transform → gold DQ"
      max_concurrent_runs: 1
      timeout_seconds: 14400       # 4-hour timeout
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"   # 01:00 UTC daily
        timezone_id: UTC

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com
        on_success: []

      # Serverless environment — pip dependencies available to all tasks
      environments:
        - environment_key: lakehouse_env
          spec:
            dependencies:
              - pyyaml==6.0.1
              - applicationinsights==0.11.10
              - azure-devops==7.1.0b4
              - msrest==0.7.1
              - openlineage-python>=1.13.0
          environment_vars:
            OPENLINEAGE_TRANSPORT: "${var.openlineage_transport}"
            OPENLINEAGE_URL:       "${var.openlineage_url}"
            OPENLINEAGE_NAMESPACE: "${var.openlineage_namespace}"
            LAKEHOUSE_ENV:         "${var.env}"

      tasks:
        # Task 1: Ingest from Azure SQL
        - task_key: ingest_azure_sql_sales
          description: "Ingest Azure SQL sales tables to Bronze"
          environment_key: lakehouse_env
          spark_python_task:
            python_file: "src/ingestion/batch/sql_ingestion.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--source_id"
              - "azure_sql_sales"
              - "--storage-account"
              - "${var.storage_account}"
          timeout_seconds: 3600
          max_retries: 2
          min_retry_interval_millis: 60000

        # Task 2: Bronze DQ Check
        - task_key: bronze_dq_sales
          description: "Data quality checks on Bronze sales layer"
          depends_on:
            - task_key: ingest_azure_sql_sales
          environment_key: lakehouse_env
          spark_python_task:
            python_file: "src/quality/dq_checks.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--config"
              - "configs/quality/bronze_dq_config.yaml"
          timeout_seconds: 1800
          max_retries: 1

        # Task 3: Bronze → Silver cleaning
        - task_key: silver_clean_sales
          description: "Bronze to Silver cleaning and standardization"
          depends_on:
            - task_key: bronze_dq_sales
              outcome: SUCCESS           # Skip Silver if Bronze DQ failed
          environment_key: lakehouse_env
          spark_python_task:
            python_file: "src/cleaning/bronze_to_silver.py"
            parameters:
              - "--env"
              - "${var.env}"
          timeout_seconds: 3600
          max_retries: 2

        # Task 4: Silver DQ Check
        - task_key: silver_dq_sales
          description: "Data quality checks on Silver layer"
          depends_on:
            - task_key: silver_clean_sales
          environment_key: lakehouse_env
          spark_python_task:
            python_file: "src/quality/dq_checks.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--config"
              - "configs/quality/silver_dq_config.yaml"
          timeout_seconds: 1800

        # Task 5: Silver → Gold transformation (fan-out)
        - task_key: gold_dim_customer
          description: "Build dim_customer Gold table"
          depends_on:
            - task_key: silver_dq_sales
              outcome: SUCCESS
          environment_key: lakehouse_env
          spark_python_task:
            python_file: "src/transformation/silver_to_gold.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--table"
              - "dim_customer"
          timeout_seconds: 3600

        - task_key: gold_dim_product
          description: "Build dim_product Gold table"
          depends_on:
            - task_key: silver_dq_sales
              outcome: SUCCESS
          environment_key: lakehouse_env
          spark_python_task:
            python_file: "src/transformation/silver_to_gold.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--table"
              - "dim_product"
          timeout_seconds: 1800

        - task_key: gold_fact_sales
          description: "Build fact_sales Gold table"
          depends_on:
            - task_key: gold_dim_customer
            - task_key: gold_dim_product
          environment_key: lakehouse_env
          spark_python_task:
            python_file: "src/transformation/silver_to_gold.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--table"
              - "fact_sales"
          timeout_seconds: 3600

        # Task 6: Gold DQ
        - task_key: gold_dq_sales
          description: "Data quality checks on Gold layer"
          depends_on:
            - task_key: gold_fact_sales
          environment_key: lakehouse_env
          spark_python_task:
            python_file: "src/quality/dq_checks.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--config"
              - "configs/quality/gold_dq_config.yaml"
          timeout_seconds: 1800

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Streaming Pipeline
    # Dedicated cluster — serverless does not support Maven JARs required
    # by the Event Hubs Spark connector. A 2-node fixed cluster is used;
    # ON_DEMAND_AZURE ensures no spot interruptions on a continuous workload.
    # ---------------------------------------------------------------------------
    streaming_eventhub_pipeline:
      name: "lakehouse-streaming-eventhub-${var.env}"
      description: "Continuous streaming ingestion from Azure Event Hubs"
      max_concurrent_runs: 1

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      job_clusters:
        - job_cluster_key: streaming_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2           # Fixed size — autoscale not recommended for streaming
            spark_conf:
              "spark.databricks.delta.preview.enabled": "true"
              "spark.lakehouse.storage_account": "${var.storage_account}"
              "spark.databricks.io.cache.enabled": "true"
            azure_attributes:
              availability: ON_DEMAND_AZURE  # No spot — streaming cannot tolerate interruptions

      tasks:
        - task_key: stream_sales_events
          job_cluster_key: streaming_cluster
          spark_python_task:
            python_file: "src/ingestion/streaming/eventhub_streaming.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--source_id"
              - "eventhub_sales_events"
          libraries:
            - maven:
                coordinates: com.microsoft.azure:azure-eventhubs-spark_2.12:2.3.22
          timeout_seconds: 0         # No timeout for continuous streaming job
          max_retries: -1            # Always restart on failure

    # ---------------------------------------------------------------------------
    # Databricks Workflow: CDC Ingestion (Debezium → Event Hubs → Bronze)
    # Dedicated cluster — Maven Event Hubs connector required (same as streaming)
    # ---------------------------------------------------------------------------
    cdc_debezium_pipeline:
      name: "lakehouse-cdc-debezium-${var.env}"
      description: "Continuous CDC ingestion from Azure SQL via Debezium + Event Hubs"
      max_concurrent_runs: 1

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      job_clusters:
        - job_cluster_key: cdc_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 2
            spark_conf:
              "spark.databricks.delta.preview.enabled": "true"
              "spark.lakehouse.storage_account": "${var.storage_account}"
            azure_attributes:
              availability: ON_DEMAND_AZURE

      tasks:
        - task_key: cdc_ingest_sales_orders
          job_cluster_key: cdc_cluster
          spark_python_task:
            python_file: "src/ingestion/cdc/debezium_cdc_ingestion.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--source_id"
              - "cdc_sql_sales"
          libraries:
            - maven:
                coordinates: com.microsoft.azure:azure-eventhubs-spark_2.12:2.3.22
          timeout_seconds: 0
          max_retries: -1

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Delta Maintenance (OPTIMIZE + VACUUM + Monitor Refresh)
    # Weekly schedule — runs Sunday 03:00 UTC off-peak
    # ---------------------------------------------------------------------------
    delta_maintenance:
      name: "lakehouse-delta-maintenance-${var.env}"
      description: "Weekly OPTIMIZE, VACUUM, and Lakehouse Monitor refresh"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 3 ? * SUN"
        timezone_id: UTC

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      environments:
        - environment_key: maintenance_env
          spec:
            dependencies:
              - pyyaml==6.0.1

      tasks:
        - task_key: optimize_vacuum
          description: "OPTIMIZE + VACUUM all managed Delta tables"
          environment_key: maintenance_env
          spark_python_task:
            python_file: "src/monitoring/lakehouse_monitor.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--action"
              - "maintenance"
          timeout_seconds: 7200
          max_retries: 1

        - task_key: refresh_monitors
          description: "Refresh Lakehouse Monitor metrics after optimization"
          depends_on:
            - task_key: optimize_vacuum
          environment_key: maintenance_env
          spark_python_task:
            python_file: "src/monitoring/lakehouse_monitor.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--action"
              - "detect_drift"
          timeout_seconds: 3600

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Feature Engineering + ML Training
    # Daily after the batch pipeline completes
    # ---------------------------------------------------------------------------
    ml_pipeline:
      name: "lakehouse-ml-pipeline-${var.env}"
      description: "Feature engineering → Model training → MLflow registration"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 5 * * ?"    # 05:00 UTC daily (after batch at 01:00)
        timezone_id: UTC

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      environments:
        - environment_key: ml_env
          spec:
            dependencies:
              - mlflow==2.13.0
              - scikit-learn==1.4.2
              - databricks-feature-store==0.17.0
              - pyyaml==6.0.1

      tasks:
        - task_key: compute_customer_features
          description: "Compute and register customer features to Feature Store"
          environment_key: ml_env
          spark_python_task:
            python_file: "src/ml/feature_engineering.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--entity"
              - "customers"
          timeout_seconds: 3600

        - task_key: compute_product_features
          description: "Compute and register product features to Feature Store"
          environment_key: ml_env
          spark_python_task:
            python_file: "src/ml/feature_engineering.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--entity"
              - "products"
          timeout_seconds: 3600

        - task_key: train_clv_model
          description: "Train GBT CLV forecasting model and register to MLflow"
          depends_on:
            - task_key: compute_customer_features
            - task_key: compute_product_features
          environment_key: ml_env
          spark_python_task:
            python_file: "src/ml/model_training.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--action"
              - "train"
          timeout_seconds: 7200
          max_retries: 1

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Delta Sharing Setup (run once per environment)
    # ---------------------------------------------------------------------------
    delta_sharing_setup:
      name: "lakehouse-delta-sharing-setup-${var.env}"
      description: "Idempotent Delta Sharing provisioning (shares, recipients, grants)"
      max_concurrent_runs: 1

      environments:
        - environment_key: governance_env
          spec:
            dependencies:
              - pyyaml==6.0.1

      tasks:
        - task_key: setup_shares
          environment_key: governance_env
          spark_python_task:
            python_file: "src/governance/delta_sharing.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--action"
              - "setup"
          timeout_seconds: 1800

    # ---------------------------------------------------------------------------
    # Databricks Workflow: SAP / OData ERP Ingestion
    # Daily — runs after batch pipeline to enrich with SAP master data
    # ---------------------------------------------------------------------------
    sap_odata_ingestion:
      name: "lakehouse-sap-odata-${var.env}"
      description: "Incremental SAP S/4HANA OData ingestion (Business Partners, Materials)"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 30 2 * * ?"   # 02:30 UTC daily (before batch at 01:00)
        timezone_id: UTC

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      environments:
        - environment_key: odata_env
          spec:
            dependencies:
              - pyyaml==6.0.1
              - requests==2.32.3
              - requests-oauthlib==1.3.1

      tasks:
        - task_key: ingest_sap_business_partners
          description: "Ingest SAP Business Partners via OData v4"
          environment_key: odata_env
          spark_python_task:
            python_file: "src/ingestion/odata/odata_ingestion.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--source_id"
              - "sap_business_partners"
          timeout_seconds: 3600
          max_retries: 2

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Security & Governance Setup (run once per environment)
    # Applies column masks and row filters via Unity Catalog
    # ---------------------------------------------------------------------------
    security_governance_setup:
      name: "lakehouse-security-governance-${var.env}"
      description: "Apply PII column masks and RLS row filters via Unity Catalog"
      max_concurrent_runs: 1

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      environments:
        - environment_key: security_env
          spec:
            dependencies:
              - cryptography>=42.0.0
              - pyyaml==6.0.1

      tasks:
        - task_key: apply_column_masks
          description: "Apply Unity Catalog column masks on PII fields"
          environment_key: security_env
          spark_python_task:
            python_file: "src/governance/column_encryption.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--action"
              - "mask"
          timeout_seconds: 900

        - task_key: apply_row_filters
          description: "Apply Unity Catalog row filters (region + BU access control)"
          depends_on:
            - task_key: apply_column_masks
          environment_key: security_env
          spark_python_task:
            python_file: "src/governance/row_level_security.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--action"
              - "setup"
          timeout_seconds: 900

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Batch Inference Pipeline
    # Daily after model training (05:00 UTC) — scores all customers
    # ---------------------------------------------------------------------------
    batch_inference_pipeline:
      name: "lakehouse-batch-inference-${var.env}"
      description: "Daily batch scoring of all customers using Production MLflow model; champion vs challenger comparison"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"    # 06:00 UTC daily (1 hr after ML pipeline)
        timezone_id: UTC

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      environments:
        - environment_key: inference_env
          spec:
            dependencies:
              - mlflow>=2.13.0
              - numpy>=1.26.0
              - databricks-feature-store>=0.17.0
              - openlineage-python>=1.13.0
          environment_vars:
            OPENLINEAGE_TRANSPORT: "${var.openlineage_transport}"
            OPENLINEAGE_URL:       "${var.openlineage_url}"
            OPENLINEAGE_NAMESPACE: "${var.openlineage_namespace}"
            LAKEHOUSE_ENV:         "${var.env}"

      tasks:
        - task_key: score_customers
          description: "Score all active customers with champion model; log challenger comparison"
          environment_key: inference_env
          spark_python_task:
            python_file: "src/ml/batch_inference.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--model-name"
              - "${var.model_name}"
          timeout_seconds: 7200
          max_retries: 1

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Autonomous DQ Remediation Agent
    # Runs after daily batch DQ checks — remediates failures using GPT-4o
    # ---------------------------------------------------------------------------
    dq_remediation_agent:
      name: "lakehouse-dq-remediation-agent-${var.env}"
      description: "Autonomous DQ Remediation Agent: classifies DQ failures via Azure OpenAI and applies PySpark fixes"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 30 1 * * ?"    # 01:30 UTC daily (30 min after batch)
        timezone_id: UTC

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      environments:
        - environment_key: agent_env
          spec:
            dependencies:
              - openai>=1.0.0
              - pyyaml==6.0.1

      tasks:
        - task_key: run_dq_remediation
          description: "LLM-powered DQ failure classification and auto-remediation"
          environment_key: agent_env
          spark_python_task:
            python_file: "src/agents/dq_remediation_agent.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--openai-endpoint"
              - "${var.openai_endpoint}"
              - "--openai-key-secret"
              - "openai-api-key"
              - "--openai-secret-scope"
              - "${var.openai_secret_scope}"
              - "--openai-deployment"
              - "${var.openai_deployment}"
              - "--lookback-hours"
              - "26"
          timeout_seconds: 3600
          max_retries: 1

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Model Drift Monitor + Retraining Trigger
    # Daily after inference scoring — checks for distribution drift
    # ---------------------------------------------------------------------------
    model_drift_monitor:
      name: "lakehouse-model-drift-monitor-${var.env}"
      description: "Model drift detection (PSI/KS/JS) and automated retraining trigger"
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0 7 * * ?"    # 07:00 UTC daily (after ML pipeline at 05:00)
        timezone_id: UTC

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      environments:
        - environment_key: drift_env
          spec:
            dependencies:
              - mlflow>=2.13.0
              - scipy>=1.13.0
              - numpy>=1.26.0
              - requests==2.32.3
              - pyyaml==6.0.1

      tasks:
        - task_key: detect_drift
          description: "Compute PSI / KS / JS drift metrics and trigger retraining if severe"
          environment_key: drift_env
          spark_python_task:
            python_file: "src/ml/model_drift_monitor.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--model-name"
              - "${var.model_name}"
              - "--databricks-host"
              - "${workspace.host}"
              - "--token-secret-scope"
              - "${var.openai_secret_scope}"
              - "--token-secret-key"
              - "databricks-sp-token"
              - "--retraining-job-id"
              - "${var.retraining_job_id}"
              - "--lookback-days"
              - "7"
          timeout_seconds: 3600
          max_retries: 1

    # ---------------------------------------------------------------------------
    # Databricks Workflow: Agentic Orchestrator
    # Polls governance.orchestrator_events every 15 minutes and routes each
    # event to the appropriate sub-agent via GPT-4o planning.
    # ---------------------------------------------------------------------------
    agentic_orchestrator:
      name: "lakehouse-agentic-orchestrator-${var.env}"
      description: >
        Multi-agent orchestrator: polls orchestrator_events and dispatches
        DQ_FAILURE → dq_remediation, GDPR_ERASURE_REQUEST → gdpr_rtbf,
        NL_QUERY → nl_to_sql, PIPELINE_FAILURE → pipeline_diagnosis,
        SCHEMA_DRIFT → schema_drift_alert, MODEL_DRIFT → model_drift_retrain.
        Uses GPT-4o as the routing planner with rule-based fallback.
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 0/15 * * * ?"   # every 15 minutes
        timezone_id: UTC

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com

      environments:
        - environment_key: orchestrator_env
          spec:
            dependencies:
              - openai>=1.0.0
              - pyyaml==6.0.1
              - requests==2.32.3
              - databricks-sql-connector>=3.0.0

      tasks:
        - task_key: run_orchestration_cycle
          description: "Poll orchestrator_events and dispatch to sub-agents via GPT-4o planner"
          environment_key: orchestrator_env
          spark_python_task:
            python_file: "src/agents/orchestrator_agent.py"
            parameters:
              - "--env"
              - "${var.env}"
              - "--openai-endpoint"
              - "${var.openai_endpoint}"
              - "--openai-key-secret"
              - "openai-api-key"
              - "--openai-secret-scope"
              - "${var.openai_secret_scope}"
              - "--openai-deployment"
              - "${var.openai_deployment}"
              - "--databricks-host"
              - "${workspace.host}"
              - "--databricks-http-path"
              - "/sql/1.0/warehouses/lakehouse-serverless"
              - "--token-secret-scope"
              - "${var.openai_secret_scope}"
              - "--token-secret-key"
              - "databricks-sp-token"
              - "--salt-secret-scope"
              - "${var.anon_salt_secret_scope}"
              - "--salt-secret-key"
              - "gdpr-anonymization-salt"
              - "--retraining-job-id"
              - "${var.retraining_job_id}"
              - "--batch-size"
              - "20"
          timeout_seconds: 600     # 10-minute cap per polling cycle
          max_retries: 1
          min_retry_interval_millis: 30000

    # ---------------------------------------------------------------------------
    # Databricks Workflow: GDPR Right-to-be-Forgotten Agent
    # On-demand (no schedule) — triggered by privacy compliance team
    # ---------------------------------------------------------------------------
    gdpr_rtbf_agent:
      name: "lakehouse-gdpr-rtbf-agent-${var.env}"
      description: "GDPR Article 17 — Right to Erasure: anonymize or delete PII across all Delta layers"
      max_concurrent_runs: 1     # Serialise erasure requests — never run concurrently

      email_notifications:
        on_failure:
          - pratikhyamanas@gmail.com
        on_success:
          - pratikhyamanas@gmail.com   # Always notify DPO on completion

      environments:
        - environment_key: gdpr_env
          spec:
            dependencies:
              - pyyaml==6.0.1

      tasks:
        - task_key: run_rtbf_erasure
          description: "Locate and erase/anonymize PII records for the requested data subject(s)"
          environment_key: gdpr_env
          spark_python_task:
            python_file: "src/agents/gdpr_rtbf_agent.py"
            parameters:
              - "--env"
              - "${var.env}"
              # subject-ids and requester are passed at trigger time via job parameters
              - "--salt-secret-scope"
              - "${var.anon_salt_secret_scope}"
              - "--salt-secret-key"
              - "gdpr-anonymization-salt"
              - "--vacuum-hours"
              - "168"
          timeout_seconds: 7200
          max_retries: 0            # No retries — erasures must be deterministic and audited

  # ---------------------------------------------------------------------------
  # DLT Pipelines — Bronze → Silver and Silver → Gold
  # ---------------------------------------------------------------------------
  pipelines:
    bronze_to_silver_dlt:
      name: "lakehouse-bronze-to-silver-dlt-${var.env}"
      description: "DLT pipeline: Autoloader → Bronze (raw) → validated → Silver. Replaces bronze_to_silver.py batch job."
      catalog: "${var.env}_lakehouse"
      target: silver
      continuous: false              # Triggered mode (scheduled by Workflows); set true for streaming
      development: "${bundle.target == 'dev'}"
      configuration:
        landing_path: "abfss://landing@${var.storage_account}.dfs.core.windows.net/sales/orders"
      libraries:
        - notebook:
            path: "src/dlt/bronze_to_silver_dlt.py"
      clusters:
        - label: default
          autoscale:
            min_workers: 1
            max_workers: 4
            mode: ENHANCED
          spark_conf:
            "spark.databricks.delta.preview.enabled": "true"

    silver_to_gold_dlt:
      name: "lakehouse-silver-to-gold-dlt-${var.env}"
      description: "DLT pipeline: Silver CDF → dim_customer (SCD2) + dim_product (SCD1) + fact_sales + CLV. Replaces silver_to_gold.py."
      catalog: "${var.env}_lakehouse"
      target: gold
      continuous: false
      development: "${bundle.target == 'dev'}"
      libraries:
        - notebook:
            path: "src/dlt/silver_to_gold_dlt.py"
      clusters:
        - label: default
          autoscale:
            min_workers: 2
            max_workers: 8
            mode: ENHANCED
          spark_conf:
            "spark.databricks.delta.preview.enabled": "true"

# ---------------------------------------------------------------------------
# Per-environment target overrides
# ---------------------------------------------------------------------------
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: "${DEV_DATABRICKS_HOST}"
    variables:
      env: dev
      storage_account: "${DEV_STORAGE_ACCOUNT}"

  test:
    workspace:
      host: "${TEST_DATABRICKS_HOST}"
    variables:
      env: test
      storage_account: "${TEST_STORAGE_ACCOUNT}"

  prod:
    mode: production
    workspace:
      host: "${PROD_DATABRICKS_HOST}"
    variables:
      env: prod
      storage_account: "${PROD_STORAGE_ACCOUNT}"
    run_as:
      service_principal_name: "sp-lakehouse-prod-pipeline"
