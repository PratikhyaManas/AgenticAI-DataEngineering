# ============================================================
# Data Quality Config: Gold Layer — fact_sales
# Agent: Data Quality & Observability Agent
# ============================================================

layer: gold
domain: sales
entity: fact_sales
table: "{env}_lakehouse.gold.fact_sales"
run_on_schedule: "0 6 * * *"    # After Gold job; before Power BI refresh
stop_pipeline_on_failure: true   # Gold failures must block BI refresh
alert_on_failure: true

checks:

  # --- Referential Integrity ---
  - check_name: customer_sk_resolved
    check_type: consistency
    rule: referential_integrity
    column: customer_sk
    ref_table: "{env}_lakehouse.gold.dim_customer"
    ref_column: customer_sk
    threshold: 0.0               # All fact rows MUST resolve to a dimension record

  - check_name: product_sk_resolved
    check_type: consistency
    rule: referential_integrity
    column: product_sk
    ref_table: "{env}_lakehouse.gold.dim_product"
    ref_column: product_sk
    threshold: 0.0

  # --- Business Rule: Revenue Non-Negative ---
  - check_name: net_amount_non_negative
    check_type: validity
    column: net_amount
    rule: range
    min: 0.0
    threshold: 0.0               # Revenue cannot be negative in Gold

  - check_name: gross_amount_non_negative
    check_type: validity
    column: gross_amount
    rule: range
    min: 0.0
    threshold: 0.0

  # --- Uniqueness on surrogate key ---
  - check_name: order_item_sk_unique
    check_type: uniqueness
    columns: [order_item_sk]
    rule: unique
    threshold: 0.0

  # --- Date range sanity ---
  - check_name: order_date_not_future
    check_type: validity
    column: order_date
    rule: range
    max_expr: "current_date()"
    threshold: 0.0

  - check_name: ship_date_after_order
    check_type: validity
    rule: custom_sql
    sql: |
      SELECT COUNT(*) as failures, COUNT(*) as total
      FROM {table}
      WHERE ship_date IS NOT NULL
        AND ship_date < order_date
    threshold: 0.0

  # --- Completeness ---
  - check_name: order_id_not_null
    check_type: completeness
    column: order_id
    rule: not_null
    threshold: 0.0

  - check_name: order_date_not_null
    check_type: completeness
    column: order_date
    rule: not_null
    threshold: 0.0

  # --- Volume drift vs previous day ---
  - check_name: gold_volume_drift
    check_type: volume
    rule: partition_row_count
    partition_column: order_date
    lookback_days: 7
    max_drift_pct: 0.4           # Alert if today's volume differs >40% from 7-day avg

  # --- Freshness ---
  - check_name: gold_freshness
    check_type: timeliness
    column: _gold_load_ts
    rule: freshness
    max_age_hours: 8             # Gold must be refreshed within 8 hours
    threshold: 0.0

notifications:
  teams_webhook_secret_key: teams-dq-webhook-url
  email: data-engineering@company.com
  devops_work_item:
    enabled: true
    organization_url: "https://dev.azure.com/myorg"
    project: DataPlatform
    pat_secret_key: ado-pat-dq-bot
    area_path: "DataPlatform\\DataQuality"
    priority: 1                  # P1 for Gold failures (BI impact)
